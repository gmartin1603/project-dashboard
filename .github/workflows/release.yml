name: Release

on:
  push:
    branches:
      - release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Publish Tauri Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Determine release version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release tag state
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          TAG_OBJECT_SHA=$(git ls-remote --refs origin "refs/tags/$TAG" | cut -f1)

          if [ -z "$TAG_OBJECT_SHA" ]; then
            exit 0
          fi

          TAG_COMMIT_SHA=$(git ls-remote --refs origin "refs/tags/$TAG^{}" | cut -f1)
          if [ -z "$TAG_COMMIT_SHA" ]; then
            TAG_COMMIT_SHA="$TAG_OBJECT_SHA"
          fi

          if [ "$TAG_COMMIT_SHA" != "$GITHUB_SHA" ]; then
            echo "Release tag $TAG already exists at $TAG_COMMIT_SHA, but this workflow is building $GITHUB_SHA." >&2
            exit 1
          fi

          echo "Release tag $TAG already points to this commit; continuing."

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: Project Dashboard ${{ steps.version.outputs.tag }}
          releaseBody: See the attached bundles for this release.
          releaseDraft: true
          prerelease: false
