name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Publish Tauri Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate release versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          LOCKFILE_VERSION=$(node -p "require('./package-lock.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(node -p "const fs = require('fs'); const toml = fs.readFileSync('./src-tauri/Cargo.toml', 'utf8'); const match = toml.match(/^version\s*=\s*\"([^\"]+)\"/m); if (!match) throw new Error('Cargo version not found'); match[1]")

          for VERSION in "$PACKAGE_VERSION" "$LOCKFILE_VERSION" "$TAURI_VERSION" "$CARGO_VERSION"; do
            if [ "$VERSION" != "$TAG_VERSION" ]; then
              echo "Release version mismatch: tag is $TAG_VERSION but found $VERSION in project files." >&2
              exit 1
            fi
          done

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Project Dashboard ${{ github.ref_name }}
          releaseBody: See the attached bundles for this release.
          releaseDraft: true
          prerelease: false
